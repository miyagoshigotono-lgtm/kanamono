<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金物カウンター v3</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');
:root {
  --bg:#f0f2f5;--surface:#ffffff;--surface2:#f7f8fa;--border:#e2e5ea;
  --accent:#2563eb;--accent2:#0891b2;--text:#1e2433;--muted:#8892a0;
  --red:#ef4444;--blue:#3b82f6;--green:#22c55e;--yellow:#eab308;--orange:#f97316;--purple:#a855f7;
  --shadow:0 1px 4px rgba(0,0,0,.08);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* ヘッダー */
header{height:52px;min-height:52px;padding:0 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px;background:var(--surface);box-shadow:var(--shadow);}
.logo{font-size:15px;font-weight:700;letter-spacing:.05em;color:var(--text);}.logo span{color:var(--accent);}
.version{font-size:10px;color:var(--muted);font-family:'Share Tech Mono',monospace;background:var(--surface2);padding:2px 6px;border-radius:4px;border:1px solid var(--border);}
.h-sep{width:1px;height:24px;background:var(--border);margin:0 4px;}
.h-spacer{flex:1;}

/* ヘッダーボタン群 */
.hbtn{height:32px;padding:0 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);font-size:12px;font-family:'Noto Sans JP',sans-serif;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;color:var(--text);transition:all .15s;white-space:nowrap;}
.hbtn:hover{background:var(--surface2);border-color:var(--accent);}
.hbtn:disabled{opacity:.35;cursor:not-allowed;}
.hbtn.primary{background:var(--accent);color:#fff;border-color:var(--accent);}
.hbtn.primary:hover{opacity:.9;}
.hbtn.danger{color:var(--red);}
.hbtn.danger:hover{border-color:var(--red);background:#fff5f5;}

/* スタンプサイズスライダー */
.size-ctrl{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);}
.size-ctrl input[type=range]{width:72px;accent-color:var(--accent);}
.size-val{font-family:'Share Tech Mono',monospace;font-size:11px;color:var(--accent);width:20px;text-align:right;}

/* メインレイアウト */
.main-layout{flex:1;display:flex;overflow:hidden;}

/* 左ツールパネル */
.tool-panel{width:68px;min-width:68px;background:var(--surface);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:10px 0;gap:3px;overflow-y:auto;}
.sec-label{font-size:9px;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:8px 0 3px;font-family:'Share Tech Mono',monospace;}
.tbtn{width:48px;height:46px;border-radius:9px;border:1.5px solid transparent;background:transparent;cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s;}
.tbtn:hover{background:var(--surface2);}
.tbtn.active{background:#eff6ff;border-color:var(--accent);}
.tdot{width:20px;height:20px;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.15);}
.tlabel{font-size:9px;color:var(--muted);font-weight:500;}
.tdiv{width:36px;height:1px;background:var(--border);margin:5px 0;}
.tbtn-out{width:48px;height:46px;border-radius:9px;border:1.5px solid var(--border);background:var(--surface2);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;transition:all .15s;}
.tbtn-out:hover{border-color:var(--accent2);background:#f0fdff;}
.tbtn-out.active{border-color:var(--accent2);background:#ecfeff;}
.tbtn-out.hole:hover,.tbtn-out.hole.active{border-color:var(--orange);background:#fff7ed;}
.tbtn-out.del:hover,.tbtn-out.del.active{border-color:var(--red);background:#fef2f2;}
.tbtn-out .ti{font-size:17px;line-height:1;}.tbtn-out .tl{font-size:9px;color:var(--muted);}

/* キャンバスエリア */
.canvas-wrapper{flex:1;position:relative;overflow:hidden;background:#e8eaed;cursor:default;}
.canvas-inner{position:absolute;transform-origin:0 0;}
#imgCanvas{display:block;}
#overlayCanvas{display:block;position:absolute;top:0;left:0;}

/* アップロードオーバーレイ */
.upload-ov{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:var(--bg);z-index:10;cursor:pointer;}
.upload-ov.hidden{display:none;}
.upload-ov .u-icon{font-size:52px;opacity:.25;}
.upload-ov .u-text{font-size:14px;color:var(--muted);text-align:center;line-height:2;}
.upload-ov input[type=file]{position:absolute;inset:0;opacity:0;cursor:pointer;width:100%;height:100%;}

/* 右結果パネル */
.result-panel{width:250px;min-width:250px;background:var(--surface);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
.rp-hdr{padding:13px 14px 10px;border-bottom:1px solid var(--border);font-size:10px;font-weight:700;letter-spacing:.1em;color:var(--muted);text-transform:uppercase;font-family:'Share Tech Mono',monospace;}
.rp-body{flex:1;overflow-y:auto;padding:10px;}
.rrow{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:7px;background:var(--surface2);margin-bottom:4px;border:1px solid var(--border);}
.rrow .dot{width:11px;height:11px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.rrow .rn{flex:1;font-size:12px;font-weight:500;}
.rrow .rc{font-family:'Share Tech Mono',monospace;font-size:17px;font-weight:700;}
.rrow .ru{font-size:10px;color:var(--muted);}
.rp-total{border-top:1px solid var(--border);padding:11px 14px;display:flex;align-items:center;justify-content:space-between;}
.rp-total .tl{font-size:12px;color:var(--accent);font-weight:700;}
.rp-total .tv{font-family:'Share Tech Mono',monospace;font-size:20px;font-weight:700;color:var(--accent);}
.empty-r{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--muted);font-size:12px;text-align:center;line-height:1.8;}

/* ステータスバー */
.status-bar{height:24px;min-height:24px;background:var(--surface);border-top:1px solid var(--border);padding:0 14px;display:flex;align-items:center;font-size:11px;color:var(--muted);font-family:'Share Tech Mono',monospace;gap:16px;}
.sm{color:var(--accent2);}

/* モーダル */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:200;}
.modal-bg.hidden{display:none;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:24px;width:460px;max-width:90vw;box-shadow:0 8px 32px rgba(0,0,0,.15);}
.modal h3{font-size:15px;font-weight:700;margin-bottom:16px;}
.modal-results{display:flex;flex-direction:column;gap:5px;margin-bottom:18px;max-height:50vh;overflow-y:auto;}
.mrow{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--surface2);border-radius:7px;border:1px solid var(--border);}
.mrow .dot{width:13px;height:13px;border-radius:50%;flex-shrink:0;box-shadow:0 1px 2px rgba(0,0,0,.15);}
.mrow .mn{flex:1;font-size:13px;font-weight:500;}
.mrow .mc{font-family:'Share Tech Mono',monospace;font-size:19px;font-weight:700;}
.mrow .mu{font-size:11px;color:var(--muted);}
.modal-total{border-top:1px solid var(--border);padding-top:12px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;}
.modal-total .tl{font-size:13px;color:var(--accent);font-weight:700;}
.modal-total .tv{font-family:'Share Tech Mono',monospace;font-size:22px;font-weight:700;color:var(--accent);}
.modal-close{width:100%;padding:10px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:700;font-family:'Noto Sans JP',sans-serif;cursor:pointer;}
.modal-close:hover{opacity:.88;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
</style>
</head>
<body>
<header>
  <div class="logo">金物<span>カウンター</span></div>
  <div class="version">v3.0</div>
  <div class="h-sep"></div>
  <!-- Undo / Redo -->
  <button class="hbtn" id="btnUndo" disabled onclick="doUndo()" title="元に戻す (Ctrl+Z)">↩ 戻す</button>
  <button class="hbtn" id="btnRedo" disabled onclick="doRedo()" title="やり直し (Ctrl+Y)">↪ 進む</button>
  <div class="h-sep"></div>
  <!-- スタンプサイズ -->
  <div class="size-ctrl">
    <span>サイズ</span>
    <input type="range" id="sizeSlider" min="6" max="28" value="12" oninput="onSizeChange(this.value)">
    <span class="size-val" id="sizeVal">12</span>
  </div>
  <div class="h-sep"></div>
  <div class="h-spacer"></div>
  <button class="hbtn" id="btnZoomReset" onclick="resetZoom()" title="ズームリセット">⊙ リセット</button>
  <button class="hbtn primary" id="btnAnalyze" disabled onclick="openModal()">解　析</button>
</header>

<div class="main-layout">
  <!-- 左ツールパネル -->
  <div class="tool-panel">
    <div class="sec-label">色</div>
    <button class="tbtn" id="t-red"    onclick="selStamp('red')">   <div class="tdot" style="background:#ef4444"></div><div class="tlabel">赤</div></button>
    <button class="tbtn" id="t-blue"   onclick="selStamp('blue')">  <div class="tdot" style="background:#3b82f6"></div><div class="tlabel">青</div></button>
    <button class="tbtn" id="t-green"  onclick="selStamp('green')"> <div class="tdot" style="background:#22c55e"></div><div class="tlabel">緑</div></button>
    <button class="tbtn" id="t-yellow" onclick="selStamp('yellow')"><div class="tdot" style="background:#eab308"></div><div class="tlabel">黄</div></button>
    <button class="tbtn" id="t-orange" onclick="selStamp('orange')"><div class="tdot" style="background:#f97316"></div><div class="tlabel">橙</div></button>
    <button class="tbtn" id="t-purple" onclick="selStamp('purple')"><div class="tdot" style="background:#a855f7"></div><div class="tlabel">紫</div></button>
    <div class="tdiv"></div>
    <div class="sec-label">記号</div>
    <button class="tbtn-out" id="t-tsu" onclick="selStamp('tsu')" style="font-size:10px;font-family:'Share Tech Mono',monospace;font-weight:700;">
      <div style="font-size:11px;font-weight:700;">(通)</div><div class="tl" style="font-size:9px;color:var(--muted);">記号</div>
    </button>
    <div class="tdiv"></div>
    <div class="sec-label">範囲</div>
    <button class="tbtn-out" id="t-poly-add"  onclick="selPoly('add')"> <div class="ti">▱</div><div class="tl">合板</div></button>
    <button class="tbtn-out hole" id="t-poly-hole" onclick="selPoly('hole')"><div class="ti">⬡</div><div class="tl">穴</div></button>
    <div class="tdiv"></div>
    <div class="sec-label">編集</div>
    <button class="tbtn-out del" id="t-del" onclick="selDel()"><div class="ti">✕</div><div class="tl">削除</div></button>
  </div>

  <!-- キャンバスエリア -->
  <div class="canvas-wrapper" id="canvasWrapper">
    <div class="upload-ov" id="uploadOv">
      <div class="u-icon">🗂</div>
      <div class="u-text">図面画像をドラッグ＆ドロップ<br>またはクリックして選択<br><small>PNG / JPG</small></div>
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="canvas-inner" id="canvasInner" style="display:none">
      <canvas id="imgCanvas"></canvas>
      <canvas id="overlayCanvas"></canvas>
    </div>
  </div>

  <!-- 右結果パネル -->
  <div class="result-panel">
    <div class="rp-hdr">カウント</div>
    <div class="rp-body" id="rpBody">
      <div class="empty-r"><div style="font-size:28px;opacity:.2">📋</div>スタンプを配置して<br>解析ボタンを押してください</div>
    </div>
    <div class="rp-total" id="rpTotal" style="display:none">
      <div class="tl">合　計</div>
      <div class="tv" id="rpTotalVal">0</div>
    </div>
  </div>
</div>

<div class="status-bar">
  <span class="sm" id="statusMode">画像を読み込んでください</span>
  <span id="statusZoom">zoom: 100%</span>
</div>

<!-- 解析モーダル -->
<div class="modal-bg hidden" id="modalBg">
  <div class="modal">
    <h3>🔩 解析結果</h3>
    <div class="modal-results" id="modalResults"></div>
    <div class="modal-total"><div class="tl">合　計</div><div class="tv" id="modalTotal">0</div></div>
    <button class="modal-close" onclick="closeModal()">閉じる</button>
  </div>
</div>

<script>
// ==============================
// スタンプ定義
// ==============================
const STAMPS = {
  red:    {name:'赤',   color:'#ef4444', type:'color'},
  blue:   {name:'青',   color:'#3b82f6', type:'color'},
  green:  {name:'緑',   color:'#22c55e', type:'color'},
  yellow: {name:'黄',   color:'#eab308', type:'color'},
  orange: {name:'橙',   color:'#f97316', type:'color'},
  purple: {name:'紫',   color:'#a855f7', type:'color'},
  tsu:    {name:'(通)', color:'#64748b', type:'symbol'},
};

// ==============================
// 状態
// ==============================
let mode = null;
let stampR = 12;           // スタンプ半径（可変）
let stamps = [];           // {id, key, cx, cy}  ※画像座標（等倍）
let polygons = [];         // {id, type, points:[{x,y}], closed}  ※画像座標
let currentPoly = null;
let nid = 1;

// Undo/Redo スタック
let undoStack = [];
let redoStack = [];

// ズーム・パン
let zoom = 1;
let panX = 0, panY = 0;
let isPanning = false;
let panStart = {x:0, y:0};
let panOrigin = {x:0, y:0};

let imgObj = null;
let imgW = 0, imgH = 0;

// ==============================
// DOM
// ==============================
const imgCanvas     = document.getElementById('imgCanvas');
const overlayCanvas = document.getElementById('overlayCanvas');
const ictx = imgCanvas.getContext('2d');
const octx = overlayCanvas.getContext('2d');
const wrapper     = document.getElementById('canvasWrapper');
const inner       = document.getElementById('canvasInner');
const uploadOv    = document.getElementById('uploadOv');
const fileInput   = document.getElementById('fileInput');
const btnAnalyze  = document.getElementById('btnAnalyze');
const btnUndo     = document.getElementById('btnUndo');
const btnRedo     = document.getElementById('btnRedo');

// ==============================
// 画像読み込み
// ==============================
fileInput.addEventListener('change', e => { if(e.target.files[0]) loadImg(e.target.files[0]); });
wrapper.addEventListener('dragover', e => e.preventDefault());
wrapper.addEventListener('drop', e => { e.preventDefault(); if(e.dataTransfer.files[0]) loadImg(e.dataTransfer.files[0]); });

function loadImg(file) {
  const reader = new FileReader();
  reader.onload = ev => {
    const img = new Image();
    img.onload = () => {
      imgObj = img;
      imgW = img.naturalWidth;
      imgH = img.naturalHeight;
      imgCanvas.width  = imgW;
      imgCanvas.height = imgH;
      overlayCanvas.width  = imgW;
      overlayCanvas.height = imgH;
      overlayCanvas.style.position = 'absolute';
      overlayCanvas.style.top = '0';
      overlayCanvas.style.left = '0';
      ictx.drawImage(img, 0, 0);
      resetZoom();
      uploadOv.classList.add('hidden');
      inner.style.display = 'block';
      btnAnalyze.disabled = false;
      setStatus('ツールを選択してスタンプを配置してください');
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
}

function resetZoom() {
  const ww = wrapper.clientWidth  - 40;
  const wh = wrapper.clientHeight - 40;
  zoom = Math.min(ww / imgW, wh / imgH, 1);
  panX = Math.round((wrapper.clientWidth  - imgW * zoom) / 2);
  panY = Math.round((wrapper.clientHeight - imgH * zoom) / 2);
  applyTransform();
}

function applyTransform() {
  inner.style.transform = `translate(${panX}px,${panY}px) scale(${zoom})`;
  document.getElementById('statusZoom').textContent = `zoom: ${Math.round(zoom*100)}%`;
}

window.addEventListener('resize', () => { if(imgObj) resetZoom(); });

// ==============================
// ホイールズーム
// ==============================
wrapper.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = wrapper.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const delta = e.deltaY < 0 ? 1.12 : 1/1.12;
  const newZoom = Math.min(Math.max(zoom * delta, 0.1), 8);
  // マウス位置を基準にズーム
  panX = mx - (mx - panX) * (newZoom / zoom);
  panY = my - (my - panY) * (newZoom / zoom);
  zoom = newZoom;
  applyTransform();
}, {passive: false});

// ==============================
// パン（中ボタン or Space+ドラッグ）
// ==============================
let spaceDown = false;
document.addEventListener('keydown', e => { if(e.code==='Space') { spaceDown=true; wrapper.style.cursor='grab'; } });
document.addEventListener('keyup',   e => { if(e.code==='Space') { spaceDown=false; wrapper.style.cursor=''; } });

wrapper.addEventListener('mousedown', e => {
  if(e.button===1 || spaceDown) {
    isPanning = true;
    panStart = {x: e.clientX, y: e.clientY};
    panOrigin = {x: panX, y: panY};
    wrapper.style.cursor = 'grabbing';
    e.preventDefault();
  }
});
window.addEventListener('mousemove', e => {
  if(!isPanning) return;
  panX = panOrigin.x + (e.clientX - panStart.x);
  panY = panOrigin.y + (e.clientY - panStart.y);
  applyTransform();
});
window.addEventListener('mouseup', e => {
  if(isPanning) { isPanning = false; wrapper.style.cursor = spaceDown ? 'grab' : ''; }
});

// ==============================
// スタンプサイズ
// ==============================
function onSizeChange(val) {
  stampR = parseInt(val);
  document.getElementById('sizeVal').textContent = val;
  redraw();
}

// ==============================
// ツール選択
// ==============================
function selStamp(key) {
  mode = 'stamp_' + key;
  currentPoly = null;
  updateUI();
  setStatus(STAMPS[key].name + ' スタンプ — 図面をクリック');
  overlayCanvas.style.cursor = 'crosshair';
}
function selPoly(type) {
  mode = 'poly_' + type;
  currentPoly = null;
  updateUI();
  setStatus(type==='add' ? '合板範囲 — クリックで点追加、最初の点に戻ると確定' : '穴範囲 — クリックで点追加、最初の点に戻ると確定');
  overlayCanvas.style.cursor = 'crosshair';
}
function selDel() {
  mode = 'delete';
  currentPoly = null;
  updateUI();
  setStatus('削除 — スタンプまたは範囲をクリック');
  overlayCanvas.style.cursor = 'pointer';
}

function updateUI() {
  document.querySelectorAll('.tbtn,.tbtn-out').forEach(el => el.classList.remove('active'));
  const map = {
    stamp_red:'t-red', stamp_blue:'t-blue', stamp_green:'t-green',
    stamp_yellow:'t-yellow', stamp_orange:'t-orange', stamp_purple:'t-purple',
    stamp_tsu:'t-tsu', poly_add:'t-poly-add', poly_hole:'t-poly-hole', delete:'t-del'
  };
  if(mode && map[mode]) document.getElementById(map[mode])?.classList.add('active');
}

// ==============================
// キャンバス座標変換
// ==============================
// スクリーン座標 → 画像座標
function toImgCoord(ex, ey) {
  const rect = wrapper.getBoundingClientRect();
  const sx = ex - rect.left;
  const sy = ey - rect.top;
  return {
    x: (sx - panX) / zoom,
    y: (sy - panY) / zoom,
  };
}

// ==============================
// キャンバスイベント
// ==============================
overlayCanvas.addEventListener('click', e => {
  if(isPanning || spaceDown || !mode) return;
  const {x, y} = toImgCoord(e.clientX, e.clientY);
  if(x<0||y<0||x>imgW||y>imgH) return;

  if(mode.startsWith('stamp_')) {
    const key = mode.replace('stamp_','');
    saveUndo();
    stamps.push({id:nid++, key, cx:x, cy:y, r:stampR});
    redraw(); updatePanel();
  } else if(mode.startsWith('poly_')) {
    const type = mode.replace('poly_','');
    polyClick(x, y, type);
  } else if(mode==='delete') {
    doDelete(x, y);
  }
});

overlayCanvas.addEventListener('mousemove', e => {
  if(isPanning || spaceDown) return;
  if(!mode?.startsWith('poly_') || !currentPoly) return;
  const {x,y} = toImgCoord(e.clientX, e.clientY);
  redraw(x, y);
});

// ==============================
// ポリゴン
// ==============================
function polyClick(x, y, type) {
  if(!currentPoly || currentPoly.type !== type) {
    saveUndo();
    currentPoly = {id:nid++, type, points:[{x,y}], closed:false};
    return;
  }
  const f = currentPoly.points[0];
  const distPx = Math.hypot((x-f.x)*zoom, (y-f.y)*zoom); // スクリーン上の距離
  if(distPx < 14 && currentPoly.points.length >= 3) {
    currentPoly.closed = true;
    polygons.push({...currentPoly, points:[...currentPoly.points]});
    currentPoly = null;
    redraw(); updatePanel();
  } else {
    currentPoly.points.push({x,y});
    redraw();
  }
}

// ==============================
// 削除
// ==============================
function doDelete(x, y) {
  // スタンプ（スクリーン上の距離で判定）
  const si = stamps.findIndex(s => Math.hypot((s.cx-x)*zoom, (s.cy-y)*zoom) < (s.r||stampR)+6);
  if(si !== -1) { saveUndo(); stamps.splice(si,1); redraw(); updatePanel(); return; }
  // ポリゴン
  const pi = polygons.findIndex(p => pip(x,y,p.points));
  if(pi !== -1) { saveUndo(); polygons.splice(pi,1); redraw(); updatePanel(); }
}

// ==============================
// Undo / Redo
// ==============================
function saveUndo() {
  undoStack.push(snapshot());
  redoStack = [];
  updateUndoUI();
}

function snapshot() {
  return {
    stamps:   stamps.map(s=>({...s})),
    polygons: polygons.map(p=>({...p, points:[...p.points]})),
  };
}

function restore(snap) {
  stamps   = snap.stamps.map(s=>({...s}));
  polygons = snap.polygons.map(p=>({...p, points:[...p.points]}));
}

function doUndo() {
  if(!undoStack.length) return;
  redoStack.push(snapshot());
  restore(undoStack.pop());
  currentPoly = null;
  redraw(); updatePanel(); updateUndoUI();
}

function doRedo() {
  if(!redoStack.length) return;
  undoStack.push(snapshot());
  restore(redoStack.pop());
  currentPoly = null;
  redraw(); updatePanel(); updateUndoUI();
}

function updateUndoUI() {
  btnUndo.disabled = !undoStack.length;
  btnRedo.disabled = !redoStack.length;
}

// キーボードショートカット
document.addEventListener('keydown', e => {
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey) { e.preventDefault(); doUndo(); }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z'&&e.shiftKey))) { e.preventDefault(); doRedo(); }
});

// ==============================
// 描画（画像座標で全て管理）
// ==============================
function redraw(mx, my) {
  octx.clearRect(0, 0, imgW, imgH);
  polygons.forEach(p => drawPoly(p, false));
  if(currentPoly) drawPoly(currentPoly, true, mx, my);
  stamps.forEach(s => drawStamp(s));
}

function drawPoly(p, inProg, mx, my) {
  if(!p.points.length) return;
  const isHole = p.type==='hole';
  const fc = isHole ? 'rgba(249,115,22,.15)' : 'rgba(37,99,235,.12)';
  const sc = isHole ? '#f97316' : '#2563eb';
  // スクリーン上の線幅に合わせて画像座標でlwを逆算
  const lw = 1.5 / zoom;

  octx.beginPath();
  octx.moveTo(p.points[0].x, p.points[0].y);
  p.points.forEach((pt,i) => { if(i>0) octx.lineTo(pt.x,pt.y); });
  if(inProg && mx!==undefined) octx.lineTo(mx, my);
  if(!inProg || p.closed) octx.closePath();
  if(p.closed || !inProg) { octx.fillStyle=fc; octx.fill(); }
  octx.strokeStyle = sc;
  octx.lineWidth = lw;
  octx.setLineDash(inProg ? [5/zoom, 3/zoom] : []);
  octx.stroke();
  octx.setLineDash([]);

  // 頂点
  const dotR = 4 / zoom;
  const firstR = 6 / zoom;
  p.points.forEach((pt,i) => {
    octx.beginPath();
    octx.arc(pt.x, pt.y, i===0 ? firstR : dotR, 0, Math.PI*2);
    octx.fillStyle = sc; octx.fill();
  });
}

function drawStamp(s) {
  const def = STAMPS[s.key]; if(!def) return;
  const r = s.r || stampR;

  if(def.type==='symbol') {
    octx.beginPath();
    octx.arc(s.cx, s.cy, r, 0, Math.PI*2);
    octx.fillStyle = 'rgba(100,116,139,.2)'; octx.fill();
    octx.strokeStyle = def.color; octx.lineWidth = 1.5/zoom; octx.stroke();
    octx.fillStyle = def.color;
    octx.font = `bold ${Math.round(r*0.85)}px 'Noto Sans JP'`;
    octx.textAlign = 'center'; octx.textBaseline = 'middle';
    octx.fillText('通', s.cx, s.cy);
  } else {
    octx.beginPath();
    octx.arc(s.cx, s.cy, r, 0, Math.PI*2);
    octx.fillStyle = def.color + 'cc'; octx.fill();
    octx.strokeStyle = 'rgba(255,255,255,.8)'; octx.lineWidth = 1.5/zoom; octx.stroke();
  }
}

// ==============================
// ポイントインポリゴン
// ==============================
function pip(px,py,pts) {
  let inside=false;
  for(let i=0,j=pts.length-1;i<pts.length;j=i++){
    const xi=pts[i].x,yi=pts[i].y,xj=pts[j].x,yj=pts[j].y;
    if(((yi>py)!==(yj>py))&&px<(xj-xi)*(py-yi)/(yj-yi)+xi) inside=!inside;
  }
  return inside;
}

function inPoly(s) {
  const inAdd  = polygons.filter(p=>p.type==='add' &&p.closed).some(p=>pip(s.cx,s.cy,p.points));
  const inHole = polygons.filter(p=>p.type==='hole'&&p.closed).some(p=>pip(s.cx,s.cy,p.points));
  return inAdd && !inHole;
}

// ==============================
// 集計
// ==============================
function calc() {
  const hasPoly = polygons.some(p=>p.type==='add'&&p.closed);
  const counts = {};
  stamps.forEach(s => {
    const def = STAMPS[s.key]; if(!def) return;
    let label = def.name;
    if(hasPoly && inPoly(s)) label += '(合)';
    if(!counts[label]) counts[label]={color:def.color, count:0};
    counts[label].count++;
  });
  return counts;
}

// ==============================
// 結果パネル
// ==============================
function updatePanel() {
  const counts = calc();
  const entries = Object.entries(counts);
  const rpBody = document.getElementById('rpBody');
  const rpTotal = document.getElementById('rpTotal');
  if(!entries.length) {
    rpBody.innerHTML='<div class="empty-r"><div style="font-size:28px;opacity:.2">📋</div>スタンプを配置して<br>解析ボタンを押してください</div>';
    rpTotal.style.display='none'; return;
  }
  const total = entries.reduce((s,[,v])=>s+v.count,0);
  rpBody.innerHTML = entries.map(([label,v])=>`
    <div class="rrow">
      <div class="dot" style="background:${v.color}"></div>
      <div class="rn">${label}</div>
      <div class="rc" style="color:${v.color}">${v.count}</div>
      <div class="ru">個</div>
    </div>`).join('');
  document.getElementById('rpTotalVal').textContent = total;
  rpTotal.style.display = 'flex';
}

// ==============================
// モーダル
// ==============================
function openModal() {
  const counts = calc();
  const entries = Object.entries(counts);
  const total = entries.reduce((s,[,v])=>s+v.count,0);
  document.getElementById('modalResults').innerHTML = entries.length
    ? entries.map(([label,v])=>`
      <div class="mrow">
        <div class="dot" style="background:${v.color}"></div>
        <div class="mn">${label}</div>
        <div class="mc" style="color:${v.color}">${v.count}</div>
        <div class="mu">個</div>
      </div>`).join('')
    : '<div style="color:var(--muted);font-size:13px;padding:8px">スタンプがありません</div>';
  document.getElementById('modalTotal').textContent = total;
  document.getElementById('modalBg').classList.remove('hidden');
}

function closeModal() { document.getElementById('modalBg').classList.add('hidden'); }

function setStatus(msg) { document.getElementById('statusMode').textContent = msg; }
</script>
