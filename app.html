<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>金物カウンター</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Share+Tech+Mono&display=swap');

  :root {
    --bg: #1a1c20;
    --surface: #22252b;
    --border: #2e3139;
    --accent: #4a9eff;
    --text: #e8eaf0;
    --muted: #6b7280;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  header h1 { font-size: 18px; font-weight: 700; letter-spacing: 0.05em; }
  header .sub { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; margin-top: 2px; }
  .icon { width: 36px; height: 36px; background: var(--accent); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 18px; }

  main {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 340px;
    height: calc(100vh - 65px);
  }

  .image-area {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    border-right: 1px solid var(--border);
    overflow: hidden;
  }

  .drop-zone {
    flex: 1;
    border: 2px dashed var(--border);
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s;
    position: relative;
    overflow: hidden;
    min-height: 300px;
  }

  .drop-zone:hover, .drop-zone.dragover { border-color: var(--accent); background: rgba(74,158,255,0.04); }
  .drop-zone .hint { font-size: 13px; color: var(--muted); text-align: center; line-height: 1.8; pointer-events: none; }
  .drop-icon { font-size: 40px; opacity: 0.3; pointer-events: none; }

  .drop-zone img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: contain;
    padding: 8px;
  }

  .drop-zone input[type=file] {
    position: absolute; inset: 0;
    opacity: 0; cursor: pointer;
    width: 100%; height: 100%;
  }

  .filename { font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; text-align: center; height: 16px; }

  .btn-analyze {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 8px;
    padding: 12px 24px;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    font-weight: 700;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    letter-spacing: 0.05em;
  }

  .btn-analyze:hover { opacity: 0.85; }
  .btn-analyze:active { transform: scale(0.98); }
  .btn-analyze:disabled { opacity: 0.3; cursor: not-allowed; }

  .result-area {
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    overflow-y: auto;
  }

  .result-area h2 { font-size: 13px; font-weight: 500; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; }

  .result-list { display: flex; flex-direction: column; gap: 10px; }

  .result-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    gap: 14px;
    animation: fadeIn 0.3s ease forwards;
    opacity: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .color-dot { width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0; }
  .color-name { flex: 1; font-size: 15px; font-weight: 500; }
  .color-count { font-family: 'Share Tech Mono', monospace; font-size: 26px; font-weight: 700; line-height: 1; }
  .color-unit { font-size: 12px; color: var(--muted); margin-top: 2px; text-align: right; }

  .total-box {
    background: var(--surface);
    border: 1px solid var(--accent);
    border-radius: 10px;
    padding: 16px 18px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .total-box .label { font-size: 13px; color: var(--accent); font-weight: 700; letter-spacing: 0.05em; }
  .total-box .value { font-family: 'Share Tech Mono', monospace; font-size: 28px; font-weight: 700; color: var(--accent); }

  .empty-state {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
    color: var(--muted);
    font-size: 13px;
    text-align: center;
    line-height: 1.8;
  }

  .empty-state .big { font-size: 32px; opacity: 0.2; }
  .status-bar { padding: 6px 18px; font-size: 12px; color: var(--muted); font-family: 'Share Tech Mono', monospace; border-top: 1px solid var(--border); }
  .loading { display: inline-block; width: 14px; height: 14px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; vertical-align: middle; margin-right: 6px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  canvas { display: none; }
</style>
</head>
<body>

<header>
  <div class="icon">🔩</div>
  <div>
    <h1>金物カウンター</h1>
    <div class="sub">COLOR DETECTION TOOL v0.1</div>
  </div>
</header>

<main>
  <div class="image-area">
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">🗂</div>
      <div class="hint">画像をドラッグ＆ドロップ<br>またはクリックして選択<br><small>PNG / JPG</small></div>
      <img id="preview" style="display:none">
      <input type="file" id="fileInput" accept="image/*">
    </div>
    <div class="filename" id="filename">—</div>
    <button class="btn-analyze" id="btnAnalyze" disabled>解　析</button>
  </div>

  <div class="result-area">
    <h2>解析結果</h2>
    <div id="resultContent">
      <div class="empty-state">
        <div class="big">📋</div>
        図面画像を読み込んで<br>「解析」ボタンを押してください
      </div>
    </div>
  </div>
</main>

<div class="status-bar" id="statusBar">待機中</div>
<canvas id="canvas"></canvas>

<script>
const COLOR_DEFS = [
  { name:"赤", dot:"#ff5f5f", ranges:[
    {hMin:0,   hMax:10,  sMin:80, vMin:80},
    {hMin:160, hMax:180, sMin:80, vMin:80},
  ]},
  { name:"青", dot:"#4a9eff", ranges:[{hMin:90, hMax:130, sMin:80, vMin:80}]},
  { name:"緑", dot:"#4ecb71", ranges:[{hMin:40, hMax:80,  sMin:80, vMin:80}]},
  { name:"黄", dot:"#ffd040", ranges:[{hMin:20, hMax:35,  sMin:80, vMin:80}]},
  { name:"橙", dot:"#ff9040", ranges:[{hMin:11, hMax:19,  sMin:80, vMin:80}]},
  { name:"紫", dot:"#b07fff", ranges:[{hMin:130,hMax:160, sMin:80, vMin:80}]},
];

const MIN_AREA = 200;

function rgbToHsv(r,g,b){
  r/=255;g/=255;b/=255;
  const max=Math.max(r,g,b),min=Math.min(r,g,b),d=max-min;
  let h=0,s=max===0?0:d/max,v=max;
  if(d!==0){
    if(max===r)      h=((g-b)/d+(g<b?6:0))/6;
    else if(max===g) h=((b-r)/d+2)/6;
    else             h=((r-g)/d+4)/6;
  }
  return[Math.round(h*180),Math.round(s*255),Math.round(v*255)];
}

function buildMask(data,w,h,ranges){
  const mask=new Uint8Array(w*h);
  for(let i=0;i<w*h;i++){
    const[hv,sv,vv]=rgbToHsv(data[i*4],data[i*4+1],data[i*4+2]);
    for(const rng of ranges){
      if(hv>=rng.hMin&&hv<=rng.hMax&&sv>=rng.sMin&&vv>=rng.vMin){mask[i]=1;break;}
    }
  }
  return mask;
}

function dilate(mask,w,h,k){
  const out=new Uint8Array(w*h),half=Math.floor(k/2);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let f=false;
    outer:for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){
      const ny=y+dy,nx=x+dx;
      if(ny>=0&&ny<h&&nx>=0&&nx<w&&mask[ny*w+nx]){f=true;break outer;}
    }
    out[y*w+x]=f?1:0;
  }
  return out;
}

function erode(mask,w,h,k){
  const out=new Uint8Array(w*h),half=Math.floor(k/2);
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    let a=true;
    outer:for(let dy=-half;dy<=half;dy++)for(let dx=-half;dx<=half;dx++){
      const ny=y+dy,nx=x+dx;
      if(ny<0||ny>=h||nx<0||nx>=w||!mask[ny*w+nx]){a=false;break outer;}
    }
    out[y*w+x]=a?1:0;
  }
  return out;
}

function countBlobs(mask,w,h){
  const label=new Int32Array(w*h).fill(-1);
  const parent=[];
  function find(x){while(parent[x]!==x){parent[x]=parent[parent[x]];x=parent[x];}return x;}
  function union(a,b){a=find(a);b=find(b);if(a!==b)parent[b]=a;}
  let next=0;
  for(let y=0;y<h;y++)for(let x=0;x<w;x++){
    const i=y*w+x;
    if(!mask[i])continue;
    const up=y>0?label[(y-1)*w+x]:-1;
    const lf=x>0?label[y*w+x-1]:-1;
    if(up===-1&&lf===-1){label[i]=next;parent.push(next);next++;}
    else if(up!==-1&&lf===-1)label[i]=up;
    else if(up===-1&&lf!==-1)label[i]=lf;
    else{label[i]=up;union(up,lf);}
  }
  const areas={};
  for(let i=0;i<w*h;i++){
    if(label[i]===-1)continue;
    const r=find(label[i]);
    areas[r]=(areas[r]||0)+1;
  }
  return Object.values(areas).filter(a=>a>=MIN_AREA).length;
}

function analyze(imgEl){
  const canvas=document.getElementById("canvas");
  canvas.width=imgEl.naturalWidth;
  canvas.height=imgEl.naturalHeight;
  const ctx=canvas.getContext("2d");
  ctx.drawImage(imgEl,0,0);
  const{data,width,height}=ctx.getImageData(0,0,canvas.width,canvas.height);
  const results=[];
  for(const def of COLOR_DEFS){
    let mask=buildMask(data,width,height,def.ranges);
    mask=erode(dilate(mask,width,height,5),width,height,5);
    const count=countBlobs(mask,width,height);
    if(count>0)results.push({name:def.name,dot:def.dot,count});
  }
  return results;
}

// UI
const dropZone=document.getElementById("dropZone");
const fileInput=document.getElementById("fileInput");
const preview=document.getElementById("preview");
const filename=document.getElementById("filename");
const btnAnalyze=document.getElementById("btnAnalyze");
const resultContent=document.getElementById("resultContent");
const statusBar=document.getElementById("statusBar");

fileInput.addEventListener("change",e=>{if(e.target.files[0])loadFile(e.target.files[0]);});
dropZone.addEventListener("dragover",e=>{e.preventDefault();dropZone.classList.add("dragover");});
dropZone.addEventListener("dragleave",()=>dropZone.classList.remove("dragover"));
dropZone.addEventListener("drop",e=>{
  e.preventDefault();dropZone.classList.remove("dragover");
  if(e.dataTransfer.files[0])loadFile(e.dataTransfer.files[0]);
});

function loadFile(file){
  filename.textContent=file.name;
  const reader=new FileReader();
  reader.onload=ev=>{
    preview.onload=()=>{
      preview.style.display="block";
      dropZone.querySelector(".drop-icon").style.display="none";
      dropZone.querySelector(".hint").style.display="none";
      btnAnalyze.disabled=false;
      setStatus("画像読み込み完了 — 解析ボタンを押してください");
    };
    preview.src=ev.target.result;
  };
  reader.readAsDataURL(file);
}

btnAnalyze.addEventListener("click",()=>{
  btnAnalyze.disabled=true;
  setStatus('<span class="loading"></span>解析中...');
  resultContent.innerHTML='<div class="empty-state"><div class="loading" style="width:24px;height:24px;border-width:3px"></div></div>';
  setTimeout(()=>{
    try{
      const results=analyze(preview);
      renderResults(results);
      setStatus("解析完了");
    }catch(e){
      resultContent.innerHTML=`<div style="color:#ff5f5f;padding:12px">エラー: ${e.message}</div>`;
      setStatus("エラー発生");
    }finally{
      btnAnalyze.disabled=false;
    }
  },50);
});

function renderResults(results){
  if(results.length===0){
    resultContent.innerHTML='<div class="empty-state"><div class="big">🔍</div>色が検出されませんでした</div>';
    return;
  }
  const total=results.reduce((s,r)=>s+r.count,0);
  let html='<div class="result-list">';
  results.forEach((r,i)=>{
    html+=`<div class="result-item" style="animation-delay:${i*0.06}s">
      <div class="color-dot" style="background:${r.dot}"></div>
      <div class="color-name">${r.name}</div>
      <div><div class="color-count" style="color:${r.dot}">${r.count}</div><div class="color-unit">個</div></div>
    </div>`;
  });
  html+=`</div><div class="total-box" style="margin-top:10px">
    <div class="label">合　計</div>
    <div class="value">${total} <span style="font-size:14px;opacity:0.7">個</span></div>
  </div>`;
  resultContent.innerHTML=html;
}

function setStatus(msg){statusBar.innerHTML=msg;}
</script>
</body>
</html>
